plugins {
  id 'java'
  id 'application'
  id 'org.openjfx.javafxplugin' version '0.1.0'
  id 'checkstyle'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

ext {
  junitVersion = '5.9.1'
}

dependencies {
  testImplementation 'org.junit.jupiter:junit-jupiter-api:' + junitVersion
  testImplementation 'org.junit.jupiter:junit-jupiter-params:' + junitVersion
  testImplementation 'org.mockito:mockito-core:4.3.+'


  // JUnit Jupiter Engine for testing
  testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:' + junitVersion
  // Required explicitly in Gradle 9+
  testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

  // Null-safety annotations (@Nullable, @NotNull, etc.) — compile-time only
  compileOnly 'org.jetbrains:annotations:24.1.0'

  // This dependency is used by the application.
  implementation 'com.google.guava:guava:32.1.1-jre'

    // atlantaFX -> adds nice CSS overlays and some additional controls for JavaFX
    implementation 'io.github.mkpaz:atlantafx-base:2.0.1'
    implementation 'org.controlsfx:controlsfx:11.2.0'
    // https://mvnrepository.com/artifact/com.jfoenix/jfoenix
    implementation group: 'com.jfoenix', name: 'jfoenix', version: '9.0.1'
    implementation group: 'org.kordamp.ikonli', name:'ikonli-javafx', version: '12.3.1'
    implementation 'org.kordamp.ikonli:ikonli-materialdesign2-pack:12.3.1'


    //JSON Library
  implementation 'com.fasterxml.jackson.core:jackson-databind:2.16.0-rc1'
  // For LocalDate in ToDoDecorator
  implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jdk8:2.16.0'
  // https://mvnrepository.com/artifact/com.fasterxml.jackson.datatype/jackson-datatype-jsr310
  implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.16.0'



}

test {
  useJUnitPlatform() // Use JUnit platform for unit tests
  testLogging {
    events "PASSED", "SKIPPED", "FAILED"
  }
}

javafx {
  version = '21.0.1'
  modules = ['javafx.controls', 'javafx.fxml', 'javafx.media']
}

java {
  sourceCompatibility = JavaVersion.VERSION_17
  targetCompatibility = JavaVersion.VERSION_17
}

tasks.named('compileJava') {
  options.encoding = 'UTF-8'
}

application {
    // Define the main class for the application.
    mainClass = 'pm3.hs23.it22a_win.team1.dashboard.App'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

checkstyle {
  toolVersion = '10.20.2'
  configFile = file("${rootDir}/config/checkstyle/checkstyle.xml")
  // Reports violations but does not fail the build (good for existing codebases).
  // Set to false to enforce strict linting.
  ignoreFailures = true
}
